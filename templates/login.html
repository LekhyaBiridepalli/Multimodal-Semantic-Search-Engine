<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>TKAG-RAG | Sign In - Knowledge Hub</title>

    <!-- Preconnect & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 + Icons + AOS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-start: #667eea;
            --primary-end: #764ba2;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --bg-deep: #0a0f1f;
            --card-glass: rgba(18, 28, 40, 0.7);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-white: #ffffff;
            --text-soft: #cbd5e6;
            --accent-glow: rgba(102, 126, 234, 0.5);
            --success-bright: #22c55e;
            --warning-bright: #f59e0b;
            --info-bright: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 10%, #0b1120, #030617);
            color: var(--text-white);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background orbs */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 80% 20%, rgba(102, 126, 234, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 20% 80%, rgba(118, 75, 162, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(240, 147, 251, 0.12) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: slowDrift 18s infinite alternate ease-in-out;
        }

        @keyframes slowDrift {
            0% {
                opacity: 0.5;
                transform: scale(1);
            }

            100% {
                opacity: 0.85;
                transform: scale(1.08);
            }
        }

        /* Glassmorphic card */
        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 55px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .gradient-text {
            background: var(--primary-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* Floating animation for logo */
        .logo-float {
            animation: floatSoft 3s ease-in-out infinite;
        }

        @keyframes floatSoft {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* Form inputs - modern glass style */
        .input-glass {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 1.2rem;
            padding: 0.75rem 1rem;
            color: white;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.09);
            border-color: #8b74e8;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.35);
            color: white;
            outline: none;
        }

        .input-glass::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        .input-group-custom .input-group-text {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-right: none;
            color: #a0b3e0;
            border-radius: 1.2rem 0 0 1.2rem;
        }

        .input-group-custom .input-glass {
            border-left: none;
            border-radius: 0 1.2rem 1.2rem 0;
        }

        .toggle-password {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-left: none;
            border-radius: 0 1.2rem 1.2rem 0;
            color: #b9c8ff;
            transition: 0.2s;
            cursor: pointer;
        }

        .toggle-password:hover {
            background: rgba(102, 126, 234, 0.3);
            color: white;
        }

        .btn-primary-glow {
            background: var(--primary-gradient);
            border: none;
            font-weight: 700;
            padding: 0.85rem;
            border-radius: 2rem;
            transition: all 0.25s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary-glow:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.5);
            background: var(--secondary-gradient);
        }

        .btn-primary-glow:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Social buttons */
        .social-circle {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            color: #e2e8f0;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .social-circle:hover {
            background: var(--primary-gradient);
            transform: translateY(-4px);
            border-color: transparent;
            color: white;
            box-shadow: 0 8px 18px rgba(102, 126, 234, 0.4);
        }

        /* Demo credentials pill */
        .demo-pill {
            background: rgba(102, 126, 234, 0.15);
            border-radius: 1rem;
            padding: 0.4rem 1rem;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .demo-pill:hover {
            background: rgba(102, 126, 234, 0.35);
            transform: scale(1.02);
            border-color: #8b5cf6;
        }

        .demo-pill strong {
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .form-check-input:checked {
            background-color: #667eea;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.4);
        }

        .form-check-label {
            color: #cbd5e6;
            font-size: 0.9rem;
        }

        /* Notification toast */
        .toast-notify {
            position: fixed;
            top: 90px;
            right: 24px;
            z-index: 9999;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            padding: 0.9rem 1.3rem;
            min-width: 280px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            border-left: 5px solid;
            animation: slideInRight 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .back-home-link {
            transition: 0.2s;
            display: inline-block;
        }

        .back-home-link:hover {
            transform: translateX(-4px);
            color: #a78bfa !important;
        }

        .highlight-flash {
            box-shadow: 0 0 0 2px #a78bfa !important;
            transition: all 0.1s;
        }

        @media (max-width: 576px) {
            .glass-card {
                padding: 1.5rem !important;
            }

            .demo-pill strong {
                font-size: 0.75rem;
            }
        }
    </style>
</head>

<body>

    <!-- Minimal navigation (clean) -->
    <nav class="navbar navbar-expand-lg fixed-top py-3"
        style="background: rgba(3, 7, 18, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="{{ url_for('index') }}">
                <i class="fas fa-brain me-2"
                    style="background: linear-gradient(135deg, #a78bfa, #ec489a); -webkit-background-clip: text; background-clip: text; color: transparent;"></i>
                <span
                    style="background: linear-gradient(135deg, #f0f9ff, #c7d2fe); -webkit-background-clip: text; background-clip: text; color: transparent;">TKAG-RAG</span>
            </a>
            <div class="ms-auto">
                <a href="{{ url_for('index') }}" class="btn btn-outline-light btn-sm rounded-pill px-4"
                    style="border-color: rgba(255,255,255,0.3);"><i class="fas fa-home me-1"></i> Home</a>
            </div>
        </div>
    </nav>

    <!-- Main Login Container -->
    <div class="container d-flex align-items-center justify-content-center"
        style="min-height: 100vh; padding-top: 70px; padding-bottom: 60px;">
        <div class="row w-100 justify-content-center">
            <div class="col-lg-5 col-md-7" data-aos="fade-up" data-aos-duration="800">
                <div class="glass-card p-4 p-xl-5">
                    <div class="text-center mb-4">
                        <div class="logo-float mb-3">
                            <i class="fas fa-brain fa-4x"
                                style="background: linear-gradient(145deg, #a78bfa, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent;"></i>
                        </div>
                        <h2 class="fw-bold display-6">Welcome back</h2>
                        <p class="text-muted mt-2" style="color: #b9c8ff !important;">Sign in to continue your knowledge
                            journey</p>
                    </div>

                    <form id="loginForm" method="POST" action="{{ url_for('login') }}">
                        <!-- CSRF token -->
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <!-- Username -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold"><i
                                    class="fas fa-user-astronaut me-1 text-primary"></i> Username or email</label>
                            <div class="input-group input-group-custom">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control input-glass" id="username" name="username"
                                    placeholder="johndoe or john@example.com" value="{{ request.form.username }}"
                                    required>
                            </div>
                        </div>

                        <!-- Password with toggle -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold"><i class="fas fa-key me-1 text-primary"></i>
                                Password</label>
                            <div class="input-group input-group-custom">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control input-glass" id="password" name="password"
                                    placeholder="••••••••" required>
                                <button class="toggle-password" type="button" data-target="password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Remember & Forgot row -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberCheckbox" name="remember">
                                <label class="form-check-label" for="rememberCheckbox">Keep me signed in</label>
                            </div>
                            <a href="#" id="forgotPasswordLink" class="gradient-text text-decoration-none fw-semibold"
                                style="font-size: 0.85rem;">Forgot password?</a>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary-glow w-100 py-3 fw-semibold" id="loginBtn">
                            <span id="btnText"><i class="fas fa-sign-in-alt me-2"></i>Sign In</span>
                            <div class="spinner-border spinner-border-sm d-none" id="btnSpinner" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </button>

                        <!-- Sign up link -->
                        <div class="text-center mt-4">
                            <p class="mb-0 text-muted">New to TKAG-RAG?
                                <a href="{{ url_for('register') }}" class="gradient-text fw-bold">Create account →</a>
                            </p>
                        </div>
                    </form>

                    <!-- Demo credentials with elegant design -->
                    <div class="mt-4 pt-2">
                        <div class="text-center mb-3">
                            <span class="badge" style="background: rgba(102,126,234,0.2); color:#c4b5fd;"><i
                                    class="fas fa-flask me-1"></i> Demo credentials</span>
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <div class="demo-pill text-center" data-demo-user="admin" data-demo-pass="admin123">
                                    <small class="d-block text-secondary">Administrator</small>
                                    <strong class="gradient-text">admin / admin123</strong>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="demo-pill text-center" data-demo-user="testuser" data-demo-pass="test123">
                                    <small class="d-block text-secondary">Test Explorer</small>
                                    <strong class="gradient-text">testuser / test123</strong>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Social login (modern) -->
                    <div class="text-center mt-4">
                        <p class="text-muted mb-3"><span class="mx-2">⚡</span> Or continue with</p>
                        <div class="d-flex justify-content-center gap-3">
                            <div class="social-circle" data-social="google"><i class="fab fa-google"></i></div>
                            <div class="social-circle" data-social="github"><i class="fab fa-github"></i></div>
                            <div class="social-circle" data-social="twitter"><i class="fab fa-twitter"></i></div>
                        </div>
                    </div>
                </div>

                <!-- Back to home link animated -->
                <div class="text-center mt-4">
                    <a href="{{ url_for('index') }}" class="text-secondary text-decoration-none back-home-link">
                        <i class="fas fa-arrow-left me-1"></i> Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, offset: 20, duration: 650 });

        // Enhanced notification system
        function showNotification(message, type = 'info') {
            const existingToast = $('.toast-notify');
            if (existingToast.length) existingToast.remove();

            let borderColor = '#22c55e';
            let icon = 'fa-check-circle';
            if (type === 'danger') { borderColor = '#ef4444'; icon = 'fa-exclamation-triangle'; }
            else if (type === 'warning') { borderColor = '#f59e0b'; icon = 'fa-exclamation-circle'; }
            else if (type === 'info') { borderColor = '#3b82f6'; icon = 'fa-info-circle'; }

            const toast = $(`
                <div class="toast-notify" style="border-left-color: ${borderColor};">
                    <div class="d-flex align-items-center gap-3">
                        <i class="fas ${icon}" style="color: ${borderColor}; font-size: 1.3rem;"></i>
                        <div class="flex-grow-1 fw-semibold text-white">${message}</div>
                        <button type="button" class="btn-close btn-close-white" aria-label="Close"></button>
                    </div>
                </div>
            `);
            $('body').append(toast);

            toast.find('.btn-close').on('click', () => toast.remove());
            setTimeout(() => {
                toast.css('animation', 'fadeOut 0.3s forwards');
                setTimeout(() => toast.remove(), 300);
            }, 3800);
        }

        // Toggle password visibility
        $('.toggle-password').on('click', function () {
            const targetId = $(this).data('target');
            const input = $('#' + targetId);
            const icon = $(this).find('i');
            if (input.attr('type') === 'password') {
                input.attr('type', 'text');
                icon.removeClass('fa-eye').addClass('fa-eye-slash');
            } else {
                input.attr('type', 'password');
                icon.removeClass('fa-eye-slash').addClass('fa-eye');
            }
        });

        // Fill demo credentials on click with smooth UX
        $('.demo-pill').on('click', function () {
            const user = $(this).data('demo-user');
            const pass = $(this).data('demo-pass');
            if (user && pass) {
                $('#username').val(user);
                $('#password').val(pass);
                showNotification(`✅ Demo credentials filled: ${user}`, 'success');
                // optional highlight effect
                $('#username, #password').addClass('highlight-flash');
                setTimeout(() => $('.highlight-flash').removeClass('highlight-flash'), 600);
            }
        });

        // Form submission with validation & loading state
        $('#loginForm').on('submit', function (e) {
            const username = $('#username').val().trim();
            const password = $('#password').val();

            if (!username || !password) {
                e.preventDefault();
                showNotification('Please enter both username and password', 'warning');
                return false;
            }

            // Show loading state
            const btn = $('#loginBtn');
            btn.prop('disabled', true);
            $('#btnText').addClass('d-none');
            $('#btnSpinner').removeClass('d-none');

            // Form will submit normally to Flask backend
            // The loading state provides visual feedback
            return true;
        });

    
        $(document).ready(function () {
            let type = '{{ category }}';
            if (type === 'error') type = 'danger';
            if (type === 'message') type = 'info';
            showNotification('{{ message|safe }}', type);
        });
        

        // Forgot password demo
        $('#forgotPasswordLink').on('click', function (e) {
            e.preventDefault();
            showNotification('📧 Password reset feature will be available soon. Stay tuned!', 'info');
        });

        // Social login demo
        $('.social-circle').on('click', function (e) {
            e.preventDefault();
            const platform = $(this).data('social');
            showNotification(`🔐 ${platform.charAt(0).toUpperCase() + platform.slice(1)} authentication coming soon. We're building it!`, 'info');
        });

        // Auto-focus on username field
        $(document).ready(function () {
            if (!$('#username').val()) {
                $('#username').focus();
            }

            // Check if there's a next parameter and show welcome back message
            const urlParams = new URLSearchParams(window.location.search);
            const next = urlParams.get('next');
            if (next && next.includes('dashboard')) {
                showNotification('Please login to access your dashboard', 'info');
            }

            // Remove loading state if page loads with errors (in case of form resubmission)
            if ($('.toast-notify').length === 0) {
                $('#loginBtn').prop('disabled', false);
                $('#btnText').removeClass('d-none');
                $('#btnSpinner').addClass('d-none');
            }
        });

        // Add enter key handler for better UX
        $('#password').on('keypress', function (e) {
            if (e.which === 13) {
                e.preventDefault();
                $('#loginForm').submit();
            }
        });

        // Ripple effect for buttons
        $('.btn-primary-glow').on('click', function (e) {
            if (!$(this).prop('disabled')) {
                const rippleSpan = $('<span class="ripple-effect"></span>');
                const x = e.clientX - $(this).offset().left;
                const y = e.clientY - $(this).offset().top;
                rippleSpan.css({
                    left: x + 'px',
                    top: y + 'px',
                    position: 'absolute',
                    background: 'rgba(255,255,255,0.4)',
                    borderRadius: '50%',
                    width: '30px',
                    height: '30px',
                    transform: 'scale(0)',
                    transition: 'transform 0.4s',
                    pointerEvents: 'none'
                });
                $(this).css('position', 'relative').append(rippleSpan);
                setTimeout(() => rippleSpan.css('transform', 'scale(12)'), 10);
                setTimeout(() => rippleSpan.remove(), 500);
            }
        });

        // Add ripple styles
        $('<style>').prop('type', 'text/css').html(`
            .ripple-effect {
                position: absolute;
                border-radius: 50%;
                background: white;
                transform: scale(0);
                animation: rippleAnim 0.5s linear;
                pointer-events: none;
            }
            @keyframes rippleAnim {
                to { transform: scale(12); opacity: 0; }
            }
            .btn-primary-glow {
                overflow: hidden;
            }
            .input-glass:focus {
                background: rgba(255,255,255,0.09);
            }
        `).appendTo('head');
    </script>
</body>

</html>
